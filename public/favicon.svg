<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dog face - poodle style -->
  <circle cx="16" cy="16" r="14" fill="#E8E8E8" stroke="#000" stroke-width="1"/>
  <!-- Poodle curly fur top -->
  <ellipse cx="16" cy="8" rx="8" ry="5" fill="#C0C0C0" stroke="#000" stroke-width="1"/>
  <circle cx="10" cy="6" r="3" fill="#C0C0C0" stroke="#000" stroke-width="0.5"/>
  <circle cx="22" cy="6" r="3" fill="#C0C0C0" stroke="#000" stroke-width="0.5"/>
  <!-- Ears -->
  <ellipse cx="6" cy="14" rx="4" ry="6" fill="#C0C0C0" stroke="#000" stroke-width="1"/>
  <ellipse cx="26" cy="14" rx="4" ry="6" fill="#C0C0C0" stroke="#000" stroke-width="1"/>
  <!-- Snout -->
  <ellipse cx="16" cy="18" rx="5" ry="4" fill="#D0D0D0" stroke="#000" stroke-width="1"/>
  <!-- Eyes -->
  <circle cx="12" cy="14" r="2" fill="#000"/>
  <circle cx="20" cy="14" r="2" fill="#000"/>
  <circle cx="12.5" cy="13.5" r="0.7" fill="#fff"/>
  <circle cx="20.5" cy="13.5" r="0.7" fill="#fff"/>
  <!-- Nose -->
  <ellipse cx="16" cy="17" rx="2" ry="1.5" fill="#404040"/>
  <!-- Mouth -->
  <path d="M14 20 Q16 22 18 20" stroke="#404040" stroke-width="0.5" fill="none"/>
</svg>